<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Punta de Tralca 12:30 — Almuerzo Solidario</title>
<meta name="description" content="Almuerzo Solidario · Balneario Banco Central. Nos vemos en Punta de Tralca a las 12:30. ¡Viajen con responsabilidad!">
<meta name="theme-color" content="#0b0b0b">
<meta property="og:type" content="website">
<meta property="og:url" content="https://rifa-rodrigo-ravera.github.io/convocatoria-ravera/">
<meta property="og:title" content="Nos vemos en Punta de Tralca a las 12:30 🏍️">
<meta property="og:description" content="Almuerzo Solidario · Balneario Banco Central. ¡Viajen con responsabilidad!">
<meta property="og:image" content="https://rifa-rodrigo-ravera.github.io/convocatoria-ravera/og.jpg">

<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700&family=Barlow:wght@500;600;700&display=block">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700&family=Barlow:wght@500;600;700&display=block" rel="stylesheet">
<style>
:root{--naranja:#ff6a00;--oro:#ffcf3f;--crema:#f5efe6}
*{margin:0;padding:0;box-sizing:border-box}
html{color-scheme:dark}
body{
  height:100dvh;overflow:hidden;position:relative;background:#050505;color:var(--crema);
  font-family:'Barlow',sans-serif;display:flex;flex-direction:column;
}
a{text-decoration:none;color:inherit;touch-action:manipulation;-webkit-tap-highlight-color:transparent}

/* foto de fondo a pantalla completa */
.bg{position:fixed;inset:0;z-index:0}
.bg img{width:100%;height:100%;object-fit:cover;object-position:center 26%;display:block}
.velo{position:fixed;inset:0;z-index:1;background:
  linear-gradient(180deg,rgba(0,0,0,.62) 0%,rgba(0,0,0,.18) 22%,rgba(0,0,0,.42) 46%,rgba(0,0,0,.88) 70%,#040404 100%)}

/* bloque compacto anclado abajo: la foto se luce arriba */
.contenido{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;
  justify-content:flex-end;gap:clamp(11px,2vh,20px);
  padding:max(12px,env(safe-area-inset-top)) 16px calc(14px + env(safe-area-inset-bottom))}

/* encabezado chico, fijo arriba */
.kicker{position:absolute;top:max(12px,env(safe-area-inset-top));left:16px;right:16px;
  text-align:center;font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;
  letter-spacing:clamp(2px,1vw,5px);font-size:clamp(11px,2.9vw,17px);color:var(--naranja);
  text-shadow:0 2px 14px rgba(0,0,0,.95);line-height:1.25}
.kicker b{display:block;color:#fff;font-size:clamp(13px,3.4vw,21px);letter-spacing:clamp(1px,.6vw,3px)}

/* mensaje principal */
.msg{text-align:center}
.nosvemos{font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;
  letter-spacing:clamp(3px,1.6vw,8px);font-size:clamp(13px,3.6vw,26px);color:#ffd9b0;
  text-shadow:0 2px 14px rgba(0,0,0,.9)}
.lugar{font-family:'Bebas Neue';font-size:clamp(38px,11.5vw,92px);line-height:.82;letter-spacing:1px;margin-top:1px;
  background:linear-gradient(180deg,#fff 14%,var(--oro) 58%,var(--naranja) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 6px 26px rgba(0,0,0,.8))}
.hora{display:inline-block;margin-top:clamp(7px,1.2vh,13px);background:var(--naranja);color:#fff;
  font-family:'Bebas Neue';font-size:clamp(26px,7.2vw,52px);letter-spacing:3px;padding:4px 24px 1px;border-radius:11px;
  box-shadow:0 8px 34px rgba(255,106,0,.55)}
.resp{display:inline-block;margin-top:clamp(7px,1.2vh,14px);font-family:'Barlow Condensed';font-weight:700;
  letter-spacing:clamp(2px,.9vw,4px);font-size:clamp(10.5px,2.8vw,18px);text-transform:uppercase;color:#fff;
  border:2px solid rgba(255,255,255,.5);border-radius:999px;padding:7px 18px;background:rgba(0,0,0,.3)}

/* botones de mapa: SIEMPRE 2 en una fila, compactos */
.mapas{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:520px;width:100%;margin:0 auto}
.mapa{display:flex;align-items:center;justify-content:center;gap:9px;padding:11px 8px;border-radius:15px;
  background:rgba(255,255,255,.11);border:2px solid rgba(255,255,255,.28);min-height:58px;
  backdrop-filter:blur(3px);transition:border-color .15s,background .15s,transform .12s}
.mapa:active{transform:scale(.97)}
.mapa:hover{border-color:var(--naranja);background:rgba(255,106,0,.16)}
.mapa svg{flex:none;width:clamp(30px,8vw,40px);height:clamp(30px,8vw,40px)}
.mapa .txt{display:flex;flex-direction:column;line-height:1.1;min-width:0}
.mapa .nom{font-family:'Barlow Condensed';font-weight:700;letter-spacing:2px;font-size:clamp(13px,3.4vw,17px);text-transform:uppercase}
.mapa .ir{font-size:clamp(9.5px,2.4vw,12px);color:var(--oro);letter-spacing:.5px;text-transform:uppercase;font-weight:600}
</style>
</head>
<body>

<div class="bg"><img src="rodrigo.jpg" alt="" fetchpriority="high"></div>
<div class="velo"></div>

<div class="contenido">

  <div class="kicker">
    Almuerzo Solidario
    <b>Balneario Banco Central</b>
  </div>

  <div class="msg">
    <div class="nosvemos">Nos vemos en</div>
    <div class="lugar">PUNTA<br>DE TRALCA</div>
    <div><span class="hora">12:30 HRS</span></div>
    <div><span class="resp">Viajen con responsabilidad</span></div>
  </div>

  <div class="mapas">
    <a class="mapa" href="https://waze.com/ul/h66j1bs8n2" target="_blank" rel="noopener">
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <rect x="2" y="2" width="60" height="60" rx="15" fill="#7FCDE8"/>
        <path d="M32 11c11.6 0 20 7.4 20 16.8 0 6.3-3.9 11.6-10 14.6-1.2 4.3-5.2 7.3-9.8 7.3-1.2 0-2.4-.2-3.5-.6-6.2-.9-11.5-4.6-13.9-9.8C12.3 37 11 33 11 29.3 11 18.9 20.4 11 32 11Z" fill="#fff"/>
        <circle cx="25.5" cy="29" r="3.4" fill="#1b2a33"/><circle cx="38.5" cy="29" r="3.4" fill="#1b2a33"/>
        <path d="M25 37.5c1.9 2.9 4.4 4.3 7 4.3s5.1-1.4 7-4.3" stroke="#1b2a33" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="23" cy="53" r="4.6" fill="#3a4a52"/><circle cx="43" cy="53" r="4.6" fill="#3a4a52"/>
      </svg>
      <span class="txt"><span class="nom">Waze</span><span class="ir">Tocar para ir ▸</span></span>
    </a>

    <a class="mapa" href="https://maps.app.goo.gl/YSr2oSJwY4yqsWYH6?g_st=aw" target="_blank" rel="noopener">
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <defs><clipPath id="gp"><path d="M32 3C21 3 12 12 12 23c0 14.5 20 38 20 38s20-23.5 20-38C52 12 43 3 32 3Z"/></clipPath></defs>
        <g clip-path="url(#gp)">
          <polygon points="32,23 -12,-12 76,-12" fill="#4285F4"/>
          <polygon points="32,23 -12,-12 -12,76" fill="#EA4335"/>
          <polygon points="32,23 -12,76 76,76" fill="#FBBC04"/>
          <polygon points="32,23 76,-12 76,76" fill="#34A853"/>
        </g>
        <circle cx="32" cy="23" r="8.6" fill="#fff"/>
      </svg>
      <span class="txt"><span class="nom">Maps</span><span class="ir">Tocar para ir ▸</span></span>
    </a>
  </div>

</div>
</body>
</html>
